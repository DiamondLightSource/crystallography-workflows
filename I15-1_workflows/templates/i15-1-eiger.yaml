      podSpecPatch: |
        containers:
        - name: main
          resources:
            requests:
              cpu: "1"
              memory: "{{`{{ inputs.parameters.memory }}`}}"
            limits:
              cpu: "1"
              memory: "{{`{{ inputs.parameters.memory }}`}}"

    - name: workflow-entry
      dag:
        tasks:
        - name: run-benchmark
          template: eiger-test
          dependencies: []
          arguments:
            parameters:
            - name: size
              value: "{{`{{workflow.parameters.size}}`}}"
