apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: i15-1-eiger
  labels:
    workflows.diamond.ac.uk/science-group-crystallography: "true"
  annotations:
    workflows.argoproj.io/title: i15-1-eiger
    workflows.argoproj.io/description: |
      This is a test that Runs a numpy script in a python container.
      The script finds the normal of the dot product of two random matrices.
      Matrix sizes are specified by the input parameter "size".
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/XRPD-Toolbox"
spec:
  entrypoint: workflow-entry
  arguments:
    parameters:
      - name: size
        value: 2000
      - name: memory
        value: 20Gi
  volumeClaimTemplates:
  - metadata:
      name: tmpdir
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
      storageClassName: netapp
  templates:
    - name: eiger-test
      inputs:
        parameters:
          - name: size
          - name: memory
      script:
        image: ghcr.io/diamondlightsource/xrpd-toolbox:test-rjcd
        volumeMounts:
        - name: tmpdir
          mountPath: /tmp
        command: ["python"]
        env:
          - name: MKL_NUM_THREADS
            value: "1"
          - name: NUMEXPR_NUM_THREADS
            value: "1"
          - name: OMP_NUM_THREADS
            value: "1"
        source: |
          import numpy as np
          import time

          n = int("{{`{{ inputs.parameters.size }}`}}")
          A = np.random.randn(n,n).astype('float64')
          B = np.random.randn(n,n).astype('float64')
          start_time = time.time()
          nrm = np.linalg.norm(A@B)
          print(" took {} seconds ".format(time.time() - start_time))
          print(" norm = ",nrm)
          print(np.__config__.show())
      podSpecPatch: |
        containers:
        - name: main
          resources:
            requests:
              cpu: "1"
              memory: "{{ inputs.parameters.memory }}"
            limits:
              cpu: "1"
              memory: "{{ inputs.parameters.memory }}"

    - name: workflow-entry
      dag:
        tasks:
        - name: run-benchmark
          template: eiger-test
          dependencies: []
          arguments:
            parameters:
            - name: size
              value: "{{workflow.parameters.size}}"
            - name: memory
              value: "{{workflow.parameters.memory}}"